name: Bug report
description: Report a reproducible problem in Wisp
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for us to reproduce it.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem
      placeholder: Schedule pause endpoint returns 500 for speaker names with spaces
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps in order
      placeholder: |
        1. Start container with host networking
        2. Create a schedule named Morning Routine
        3. Call PATCH /api/.../pause
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Docker version, NAS model (if applicable), and image tag
      placeholder: macOS 15, Docker 27, Synology DS920+, brisebois/soundtouch-service:latest
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or API response
      description: Paste relevant logs and response payloads
