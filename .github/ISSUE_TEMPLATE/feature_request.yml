name: Feature request
description: Propose an improvement for Wisp
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Clear use cases help prioritize features.

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or API examples
