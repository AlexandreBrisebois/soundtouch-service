repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff-check
        args: ["app", "tests"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        args: []
        additional_dependencies:
          - requests
          - zeroconf
          - flask
          - flasgger
          - websocket-client
